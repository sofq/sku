# Canonical region-group map. Expanded to P1 ("popular path") on 2026-04-22
# per docs/superpowers/plans/2026-04-22-regions-yaml-p1-expansion.md.
# Originally seeded: M3a.1 (AWS), m3b.1 (Azure), m3b.3 (GCP).
version: 1
groups:
  us-east:
    - {provider: aws,   region: us-east-1}
    - {provider: aws,   region: us-east-2}
    - {provider: aws,   region: ca-central-1}
    - {provider: azure, region: eastus}
    - {provider: azure, region: eastus2}
    - {provider: azure, region: canadacentral}
    - {provider: gcp,   region: us-east1}
    - {provider: gcp,   region: us-east4}
    - {provider: gcp,   region: northamerica-northeast1}
  us-central:
    - {provider: azure, region: centralus}
    - {provider: azure, region: southcentralus}
    - {provider: gcp,   region: us-central1}
  us-west:
    - {provider: aws,   region: us-west-1}
    - {provider: aws,   region: us-west-2}
    - {provider: azure, region: westus2}
    - {provider: azure, region: westus3}
    - {provider: gcp,   region: us-west1}
  eu-west:
    - {provider: aws,   region: eu-west-1}
    - {provider: aws,   region: eu-west-2}
    - {provider: aws,   region: eu-west-3}
    - {provider: azure, region: westeurope}
    - {provider: azure, region: uksouth}
    - {provider: azure, region: francecentral}
    - {provider: gcp,   region: europe-west1}
    - {provider: gcp,   region: europe-west2}
    - {provider: gcp,   region: europe-west4}
  eu-central:
    - {provider: aws,   region: eu-central-1}
    - {provider: azure, region: germanywestcentral}
    - {provider: gcp,   region: europe-west3}
  eu-north:
    - {provider: aws,   region: eu-north-1}
    - {provider: azure, region: northeurope}
  asia-ne:
    - {provider: aws,   region: ap-northeast-1}
    - {provider: aws,   region: ap-northeast-2}
    - {provider: azure, region: japaneast}
    - {provider: azure, region: koreacentral}
    - {provider: gcp,   region: asia-northeast1}
  asia-se:
    - {provider: aws,   region: ap-southeast-1}
    - {provider: azure, region: southeastasia}
    - {provider: gcp,   region: asia-southeast1}
  asia-south:
    - {provider: aws,   region: ap-south-1}
    - {provider: azure, region: centralindia}
    - {provider: gcp,   region: asia-south1}
  oceania:
    - {provider: aws,   region: ap-southeast-2}
    - {provider: azure, region: australiaeast}
    - {provider: gcp,   region: australia-southeast1}
  sa:
    - {provider: aws,   region: sa-east-1}
    - {provider: azure, region: brazilsouth}
    - {provider: gcp,   region: southamerica-east1}
