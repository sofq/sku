# Every enum the shard-build validator enforces (§5 Enum validation).
# M1 shipped LLM kinds; M3a.1 adds compute.vm + db.relational;
# m3b.3 adds GCP Cloud SQL engine + deployment slots.
version: 1

kind:
  - llm.text
  - llm.multimodal
  - llm.embedding
  - llm.image
  - llm.audio
  - compute.vm
  - db.relational
  - storage.object
  - compute.function
  - storage.block
  - db.nosql
  - network.cdn

commitment:
  - on_demand

tenancy:
  - ""
  - shared
  - dedicated
  # RDS engines — we repurpose the tenancy slot for db.relational rows
  # so engine participates in terms_hash.
  - postgres
  - mysql
  - mariadb
  - oracle
  - sqlserver
  - aurora-postgres
  - aurora-mysql
  - azure-sql
  - azure-postgres
  - azure-mysql
  - azure-mariadb
  - cloud-sql-postgres
  - cloud-sql-mysql
  - cloud-sql-sqlserver

os:
  - ""
  - linux
  - windows
  - rhel
  # RDS deployment options — same repurpose as tenancy above.
  - single-az
  - multi-az
  - multi-az-cluster
  - managed-instance
  - elastic-pool
  - flexible-server
  - zonal
  - regional

support_tier:
  - ""

payment_option:
  - ""
