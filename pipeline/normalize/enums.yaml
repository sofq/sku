# Every enum the shard-build validator enforces (§5 Enum validation).
# M1 shipped LLM kinds; M3a.1 adds compute.vm + db.relational.
version: 1

kind:
  - llm.text
  - llm.multimodal
  - llm.embedding
  - llm.image
  - llm.audio
  - compute.vm
  - db.relational
  - storage.object
  - compute.function
  - storage.block
  - db.nosql
  - network.cdn

commitment:
  - on_demand

tenancy:
  - ""
  - shared
  - dedicated
  # RDS engines — we repurpose the tenancy slot for db.relational rows
  # so engine participates in terms_hash. Justified by spec §5 terms_hash
  # semantics (the six-tuple exists to disambiguate pricing variants;
  # engine is exactly that for RDS).
  - postgres
  - mysql
  - mariadb
  - azure-sql      # Azure SQL "engine" slot — single value, distinguishes from db.relational AWS rows

os:
  - ""
  - linux
  - windows
  - rhel
  # RDS deployment options — same repurpose as tenancy above.
  - single-az
  - multi-az
  - managed-instance
  - elastic-pool

support_tier:
  - ""

payment_option:
  - ""
