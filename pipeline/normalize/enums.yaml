# Every enum the shard-build validator enforces (§5 Enum validation).
# M1 shipped LLM kinds; M3a.1 adds compute.vm + db.relational;
# m3b.3 adds GCP Cloud SQL engine + deployment slots.
version: 1

kind:
  - llm.text
  - llm.multimodal
  - llm.embedding
  - llm.image
  - llm.audio
  - compute.vm
  - db.relational
  - storage.object
  - compute.function
  - storage.block
  - db.nosql
  - network.cdn
  - cache.kv

commitment:
  - on_demand

tenancy:
  - ""
  - shared
  - dedicated
  # RDS engines — we repurpose the tenancy slot for db.relational rows
  # so engine participates in terms_hash.
  - postgres
  - mysql
  - mariadb
  - oracle
  - sqlserver
  - aurora-postgres
  - aurora-mysql
  - azure-sql
  - azure-postgres
  - azure-mysql
  - azure-mariadb
  - cloud-sql-postgres
  - cloud-sql-mysql
  - cloud-sql-sqlserver
  # cache.kv engines — repurpose tenancy slot for cache engine type
  - redis
  - memcached
  - sql
  - mongo
  - cassandra
  - table
  - gremlin
  - spanner-standard
  - spanner-enterprise
  - spanner-enterprise-plus
  - spanner-storage

os:
  - ""
  - linux
  - windows
  - rhel
  # RDS deployment options — same repurpose as tenancy above.
  - single-az
  - multi-az
  - multi-az-cluster
  - managed-instance
  - elastic-pool
  - flexible-server
  - zonal
  - regional
  # cache.kv deployment/tier options — repurpose os slot
  - provisioned
  - serverless
  - serverless-v2
  - storage
  - basic
  - standard
  - premium
  - enterprise

support_tier:
  - ""

payment_option:
  - ""
