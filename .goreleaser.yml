version: 2

project_name: sku

before:
  hooks:
    - go mod tidy

builds:
  - id: sku
    main: .
    binary: sku
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sofq/sku/internal/version.version={{.Version}}
      - -X github.com/sofq/sku/internal/version.commit={{.Commit}}
      - -X github.com/sofq/sku/internal/version.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"

sboms:
  - id: default
    artifacts: archive
    documents:
      - "${artifact}.spdx.sbom.json"

signs:
  - id: cosign-checksum
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

nfpms:
  - id: sku
    package_name: sku
    vendor: sofq
    homepage: https://github.com/sofq/sku
    maintainer: sofq <noreply@sofq.dev>
    description: Agent-friendly CLI for cloud + LLM pricing.
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin

snapshot:
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

git:
  ignore_tags:
    - "data-bootstrap-*"

changelog:
  disable: true

release:
  draft: true
