name: release

# Required repository secrets (set in GitHub Settings → Secrets):
#   HOMEBREW_TAP_TOKEN   — PAT with contents:write on sofq/homebrew-tap + sofq/scoop-bucket
# npm/PyPI use OIDC trusted publishing via GitHub environments (npm-publish, pypi-publish).
# GITHUB_TOKEN is auto-injected. id-token: write enables cosign keyless + SLSA.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - id: ver
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" == *-rc.* || "$GITHUB_REF_NAME" == *-pre* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  goreleaser:
    needs: compute-version
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.goreleaser.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up QEMU (multi-arch docker)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz,dist/*.zip,dist/checksums.txt"

  release-npm:
    needs: [compute-version, goreleaser]
    uses: ./.github/workflows/release-npm.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      prerelease: ${{ needs.compute-version.outputs.prerelease == 'true' }}

  release-pypi:
    needs: [compute-version, goreleaser]
    uses: ./.github/workflows/release-pypi.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      prerelease: ${{ needs.compute-version.outputs.prerelease == 'true' }}
