# .github/workflows/data-daily.yml
# Thin dispatcher preserved for the existing `gh workflow run data-daily.yml`
# entry point. Real work happens in the four child workflows. This workflow
# fans out to the three providers, waits for them to finish, then triggers
# publish — matching today's single-command end-to-end maintainer UX.
name: data-daily

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Forward to provider workflows and stop before publish"
        required: false
        default: "true"
      replace_existing_release:
        description: "Forward to publish; replace today's data release if it already exists"
        required: false
        default: "false"
      force_baseline:
        description: "Forward to child workflows"
        required: false
        default: "false"
      force_full_ingest:
        description: "Forward to data-aws.yml only (bypass ETag cache)"
        required: false
        default: "false"

permissions:
  actions: write
  contents: read

jobs:
  fan_out:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Dispatch provider workflows
        id: dispatch
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_BASELINE:    ${{ github.event.inputs.force_baseline || 'false' }}
          FORCE_FULL_INGEST: ${{ github.event.inputs.force_full_ingest || 'false' }}
        run: |
          set -euo pipefail
          # Dispatch each child; capture the new run id by diffing `gh run list`
          # before and after. `gh workflow run` does not return the run id it
          # creates, so we poll for the newest run of each workflow.
          # Output keys are sanitized (aws/azure/gcp) — GitHub Actions step
          # outputs must match `[a-zA-Z_][a-zA-Z0-9_-]*`, so using the raw
          # workflow filename (which contains `.yml`) would not round-trip.
          dispatch_and_wait() {
            local wf="$1" key="$2"; shift 2
            local before after
            before=$(gh run list --workflow "$wf" --limit 1 --json databaseId --jq '.[0].databaseId // "0"')
            gh workflow run "$wf" "$@"
            # Poll up to 60 s for the new run to appear.
            for _ in $(seq 1 30); do
              after=$(gh run list --workflow "$wf" --limit 1 --json databaseId --jq '.[0].databaseId // "0"')
              if [ "$after" != "$before" ]; then
                echo "$wf run: $after"
                echo "${key}_run_id=$after" >> "$GITHUB_OUTPUT"
                return 0
              fi
              sleep 2
            done
            echo "::error::$wf did not produce a new run within 60s" >&2
            return 1
          }

          dispatch_and_wait data-aws.yml aws \
            -f dry_run="$DRY_RUN" \
            -f force_baseline="$FORCE_BASELINE" \
            -f force_full_ingest="$FORCE_FULL_INGEST"
          dispatch_and_wait data-azure.yml azure \
            -f dry_run="$DRY_RUN" \
            -f force_baseline="$FORCE_BASELINE"
          dispatch_and_wait data-gcp.yml gcp \
            -f dry_run="$DRY_RUN" \
            -f force_baseline="$FORCE_BASELINE"

      - name: Wait for provider workflows
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          AWS_RUN:     ${{ steps.dispatch.outputs.aws_run_id }}
          AZURE_RUN:   ${{ steps.dispatch.outputs.azure_run_id }}
          GCP_RUN:     ${{ steps.dispatch.outputs.gcp_run_id }}
        run: |
          set -euo pipefail
          # `gh run watch --exit-status` blocks until the run finishes and
          # exits non-zero on failure. We want all three to complete but a
          # single provider failure should NOT block publish — the manifest
          # will just carry that provider's shards at yesterday's versions
          # (intentional failure isolation). So we watch each independently
          # and tolerate non-zero exits.
          for run in "$AWS_RUN" "$AZURE_RUN" "$GCP_RUN"; do
            [ -z "$run" ] && continue
            gh run watch "$run" --interval 30 || \
              echo "::warning::run $run did not succeed — publish will skip this provider's shards"
          done

      - name: Dispatch publish
        if: always() && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
          REPLACE_EXISTING_RELEASE: ${{ github.event.inputs.replace_existing_release || 'false' }}
        run: |
          set -euo pipefail
          gh workflow run data-publish.yml -f dry_run="$DRY_RUN" -f replace_existing_release="$REPLACE_EXISTING_RELEASE"
          echo "publish dispatched — watch via: gh run list --workflow data-publish.yml --limit 1"

      - name: Skip publish for dry run
        if: always() && github.event.inputs.dry_run == 'true'
        run: echo "dry_run=true — provider workflows stopped before artifact upload; publish not dispatched"
