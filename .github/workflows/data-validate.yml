name: data-validate

on:
  schedule:
    - cron: "0 4 * * 1"         # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      shards:
        description: "Comma-separated shards to validate (default: all)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write               # OIDC federation
  issues:   write               # drift issue filing
  actions:  read

concurrency:
  group: data-validate
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.resolve.outputs.shards }}
      catalog_version: ${{ steps.resolve.outputs.catalog_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve latest data release + shard list
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED: ${{ github.event.inputs.shards }}
        run: |
          version=$(scripts/ci/previous_release_version.sh)
          if [ -z "$version" ]; then
            echo "no versioned data release found" >&2
            exit 2
          fi
          tag="data-${version}"
          mkdir -p dist/pipeline/validate
          gh release download "$tag" --pattern manifest.json --dir dist/pipeline/validate/
          if [ -n "$REQUESTED" ]; then
            # `-c` keeps it on one line; otherwise GHA rejects the multi-line
            # value when assigned to $GITHUB_OUTPUT.
            shards=$(echo "$REQUESTED" | jq -Rc 'split(",")')
          else
            shards=$(jq -c '.shards | keys' dist/pipeline/validate/manifest.json)
          fi
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "catalog_version=$version" >> "$GITHUB_OUTPUT"

  validate:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.resolve.outputs.shards) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pipeline
      - name: Install validate extras
        run: python -m pip install -e 'pipeline[validate]'
      - name: Configure AWS credentials (OIDC)
        if: startsWith(matrix.shard, 'aws-')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_VALIDATE_ROLE_ARN }}
          aws-region: us-east-1
      - name: Authenticate to Google Cloud (WIF)
        if: startsWith(matrix.shard, 'gcp-')
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_VALIDATE_SA }}
      - name: Reconstruct shard from manifest chain
        id: reconstruct
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CV: ${{ needs.resolve.outputs.catalog_version }}
          SHARD: ${{ matrix.shard }}
        # Mirror what `sku update` does on a client: pull `baseline_url` (which
        # may live in an older release than `data-${CV}` since baselines only
        # rebuild on day 1/15 of each month) plus every delta listed in
        # `deltas[]` and apply them in order. Earlier revisions assumed every
        # release contained `<shard>.db.zst`, which is only true on
        # baseline-rebuild days.
        run: |
          set -euo pipefail
          work=dist/pipeline
          mkdir -p "$work"
          gh release download "data-${CV}" --pattern manifest.json --dir "$work/"
          manifest="$work/manifest.json"

          baseline_url=$(jq -er --arg s "$SHARD" '.shards[$s].baseline_url' "$manifest")
          baseline_sha=$(jq -er --arg s "$SHARD" '.shards[$s].baseline_sha256' "$manifest")

          curl -fsSL "$baseline_url" -o "$work/${SHARD}.db.zst"
          echo "$baseline_sha  $work/${SHARD}.db.zst" | sha256sum -c -
          zstd -d -f "$work/${SHARD}.db.zst" -o "$work/${SHARD}.db"

          # Iterate deltas in apply-order; multi-part deltas expand to parts[].
          jq -r --arg s "$SHARD" '
            .shards[$s].deltas // [] | .[] |
            if has("parts") then (.parts[] | "\(.url)\t\(.sha256)")
            else "\(.url)\t\(.sha256)" end
          ' "$manifest" | while IFS=$'\t' read -r url sha; do
            [ -z "$url" ] && continue
            part="$work/$(basename "$url")"
            curl -fsSL "$url" -o "$part"
            echo "$sha  $part" | sha256sum -c -
            gunzip -c "$part" | sqlite3 "$work/${SHARD}.db"
            rm -f "$part"
          done

          rm -f "$work/${SHARD}.db.zst"
      - name: Download vantage instances.json (EC2 only)
        if: matrix.shard == 'aws-ec2'
        run: |
          curl -sSL --fail \
            https://raw.githubusercontent.com/vantage-sh/ec2instances.info/master/www/instances.json \
            -o dist/pipeline/instances.json
      - name: Run validator
        id: validator
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          extra=()
          if [ "$SHARD" = "aws-ec2" ]; then
            extra+=(--vantage-json dist/pipeline/instances.json)
          fi
          python -m validate \
            --shard "$SHARD" \
            --shard-db "dist/pipeline/${SHARD}.db" \
            --report "dist/pipeline/${SHARD}.report.json" \
            "${extra[@]}"
      - uses: actions/upload-artifact@v7
        if: always() && hashFiles(format('dist/pipeline/{0}.report.json', matrix.shard)) != ''
        with:
          name: validate-${{ matrix.shard }}
          path: dist/pipeline/*.report.json
      - name: File or update drift issue
        # Only fire when the validator itself reported drift. Reconstruction
        # failures (manifest 404s, sha mismatches) surface as red runs in the
        # Actions UI but should not masquerade as catalog drift.
        if: always() && steps.validator.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHARD: ${{ matrix.shard }}
          CV: ${{ needs.resolve.outputs.catalog_version }}
        run: |
          set -euo pipefail
          # Self-heal labels — repo originally lacked these so the issue
          # creation step exited non-zero. `gh label create` is idempotent
          # via the `|| true` fallback when the label already exists.
          gh label create pipeline       --color B60205 --description "CI data pipeline / publish workflows" 2>/dev/null || true
          gh label create catalog-drift  --color D93F0B --description "Validator detected divergence between published catalog and upstream" 2>/dev/null || true
          title="Catalog drift in ${SHARD}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body=$(printf 'Catalog %s — validator reported drift.\n\nRun: %s\nArtifact: validate-%s' "$CV" "$run_url" "$SHARD")
          # Reuse an open issue per shard so weekly runs comment instead of
          # piling up duplicates. Match by exact title rather than the search
          # API's loose tokenization.
          existing=$(gh issue list \
              --label catalog-drift --state open --limit 100 \
              --json number,title \
            | jq --arg t "$title" -r '[.[] | select(.title == $t) | .number] | first // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --label "pipeline,catalog-drift" --body "$body"
          fi
      - name: Close drift issue on recovery
        if: steps.validator.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHARD: ${{ matrix.shard }}
          CV: ${{ needs.resolve.outputs.catalog_version }}
        run: |
          set -euo pipefail
          title="Catalog drift in ${SHARD}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list \
              --label catalog-drift --state open --limit 100 \
              --json number,title \
            | jq --arg t "$title" -r '[.[] | select(.title == $t) | .number] | first // empty')
          if [ -n "$existing" ]; then
            gh issue close "$existing" \
              --comment "Resolved: validator passed in catalog ${CV} (run ${run_url})."
          fi

  gcp-machine-types-refresh:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Skip unless first scheduled run of the month
        id: cadence
        run: |
          if [ "$(date -u +%d)" -gt 07 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.cadence.outputs.run == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_VALIDATE_SA }}
      - if: steps.cadence.outputs.run == 'true'
        uses: ./.github/actions/setup-pipeline
      - if: steps.cadence.outputs.run == 'true'
        name: Refresh fixture
        run: make gcp-machine-types-refresh
        env:
          GCP_PROJECT: ${{ vars.GCP_VALIDATE_PROJECT }}
      - if: steps.cadence.outputs.run == 'true'
        name: Commit + push + open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain pipeline/testdata/gcp_gce/machine_types.json)" ]; then
            echo "no changes — skipping PR"
            exit 0
          fi
          branch="bot/gcp-machine-types-$(date -u +%Y%m)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add pipeline/testdata/gcp_gce/machine_types.json
          git commit -m "chore(gcp-gce): refresh machine-types fixture"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(gcp-gce): refresh machine-types fixture" \
            --body  "Automated monthly refresh from aggregatedList API. Makefile target re-loads specs after fetch, so unknown families fail before this PR opens." \
            --base  main \
            --head  "$branch"
