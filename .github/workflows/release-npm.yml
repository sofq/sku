name: release-npm

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  publish:
    if: ${{ !inputs.prerelease }}  # Pre-releases skip npm per spec §7 Versioning.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download release assets from GH Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ inputs.version }}" -D artifacts \
            --pattern "sku_${{ inputs.version }}_*.tar.gz" \
            --pattern "sku_${{ inputs.version }}_*.zip"

      - name: Build and publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: node scripts/publish-npm.js artifacts "$VERSION"

      - name: Publish root @sofq/sku
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          cd npm
          node -e "const p=require('./package.json');p.version=process.env.VERSION;for(const k of Object.keys(p.optionalDependencies))p.optionalDependencies[k]=process.env.VERSION;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          npm publish --access public
