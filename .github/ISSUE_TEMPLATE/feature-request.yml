name: Feature request
description: Propose a new command, catalog coverage area, workflow, or documentation improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or catalog gap should this solve?
      placeholder: "I need to compare ... but today ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
      placeholder: "Add ..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - catalog coverage
        - compare/search
        - estimate
        - updater
        - pipeline
        - docs
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Existing commands, scripts, or manual workarounds you tried.
    validations:
      required: false
